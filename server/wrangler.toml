name = "syncora-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[vars]
API_BASE_URL = "https://api.synchora.cc"

# Custom domain
[[routes]]
pattern = "api.synchora.cc"
custom_domain = true

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "syncora-db"
database_id = "f936355a-8a36-4235-8943-082442fd67a0"

# R2 Bucket binding
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "syncora-bucket"

# Secrets (set via `wrangler secret put`):
#   JWT_SECRET
#   R2_ACCESS_KEY_ID
#   R2_SECRET_ACCESS_KEY
#   R2_ENDPOINT
#   R2_BUCKET_NAME
